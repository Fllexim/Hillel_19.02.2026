<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
  </head>

  <body class="bg-success">
    <div class="container">
      <h1 class="text-center mb-3 mt-4">ToDoList</h1>

      <form
        class="d-flex justify-content-center my-4 p-2 bg-white gap-2 rounded-3"
      >
        <input type="text" name="value" required class="form-control" />
        <button class="btn btn-success">Додати</button>
      </form>

      <ul class="list-group w-75 mx-auto"></ul>
    </div>

    <div class="modal fade" tabindex="-1" id="taskModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Ваше завдання</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            <p>Текст завдання</p>
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Закрити
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
