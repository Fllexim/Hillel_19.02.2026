<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div>
      <main class="slider">
        <img
          class="btn-control btn-back inactive"
          src="icons/angle-square-left.png"
          alt="Back"
        />

        <div class="slide">
          <img class="img-slides" src="images/1.jpg" alt="Slide 1" />
        </div>
        <div class="slide hidden">
          <img class="img-slides" src="images/2.jpg" alt="Slide 2" />
        </div>
        <div class="slide hidden">
          <img class="img-slides" src="images/3.jpg" alt="Slide 3" />
        </div>
        <div class="slide hidden">
          <img class="img-slides" src="images/4.jpg" alt="Slide 4" />
        </div>
        <div class="slide hidden">
          <img class="img-slides" src="images/5.jpg" alt="Slide 5" />
        </div>

        <img
          class="btn-control btn-next"
          src="icons/angle-square-right.png"
          alt="Next"
        />
      </main>

      <div class="dots-container"></div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
